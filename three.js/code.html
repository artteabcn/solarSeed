<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_14 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_14" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_14');
  const devicePixelRatio = window.devicePixelRatio || 1;
  ---
// Investment Calculator Component
// Logic can be added via a client-side script tag or integrated with a framework like Svelte/React if needed.

const DEFAULT_MIN = 5000000;
const DEFAULT_MAX = 100000000;
const IRR_ESTIMATE = 0.125; // 12.5%
---

<section class="py-24 bg-primary text-white overflow-hidden relative" id="calculator">
  <!-- Subtle Background Pattern -->
  <div class="absolute inset-0 opacity-10 pointer-events-none">
    <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid)" />
    </svg>
  </div>

  <div class="container mx-auto px-6 max-w-6xl relative z-10">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
      
      <div>
        <h2 class="text-4xl md:text-5xl font-bold mb-6 leading-tight">
          Yield Projection Tool
        </h2>
        <p class="text-white/80 text-lg mb-8 leading-relaxed">
          Estimate your potential returns based on the Round A performance projections. 
          <span class="italic block mt-2 text-sm opacity-70">Note: Historical performance is not a guarantee of future results.</span>
        </p>
        
        <div class="bg-white/10 backdrop-blur-sm border border-white/20 p-8 rounded-2xl">
          <label for="investment-range" class="block text-sm font-bold uppercase tracking-wider mb-6">
            Investment Amount (THB)
          </label>
          
          <div class="flex justify-between items-center mb-4">
            <span class="text-3xl font-bold" id="investment-display">฿ 5,000,000</span>
          </div>
          
          <input 
            type="range" 
            id="investment-range" 
            min={DEFAULT_MIN} 
            max={DEFAULT_MAX} 
            step="1000000" 
            value={DEFAULT_MIN}
            class="w-full h-2 bg-white/20 rounded-lg appearance-none cursor-pointer accent-secondary"
          />
          
          <div class="flex justify-between text-xs text-white/50 mt-4 font-medium uppercase tracking-tighter">
            <span>Min: 5M</span>
            <span>Max: 100M</span>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Results Cards -->
        <div class="bg-white text-charcoal p-8 rounded-2xl shadow-soft">
          <p class="text-xs font-bold uppercase tracking-widest text-charcoal/40 mb-2">Est. Annual Dividends</p>
          <p class="text-3xl font-bold text-primary" id="annual-dividends">฿ 625,000</p>
        </div>
        
        <div class="bg-white text-charcoal p-8 rounded-2xl shadow-soft">
          <p class="text-xs font-bold uppercase tracking-widest text-charcoal/40 mb-2">5-Year Projected ROI</p>
          <p class="text-3xl font-bold text-secondary" id="roi-projection">62.5%</p>
        </div>

        <div class="md:col-span-2 bg-charcoal text-white p-8 rounded-2xl flex flex-col md:flex-row justify-between items-center gap-6">
          <div>
            <p class="text-xs font-bold uppercase tracking-widest text-white/40 mb-1">Share Allocation</p>
            <p class="text-2xl font-bold" id="share-allocation">50,000 Units</p>
          </div>
          <button class="w-full md:w-auto px-10 py-4 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg transition-transform active:scale-95">
            Get Terms
          </button>
        </div>
      </div>

    </div>
  </div>
</section>

<script is:inline define:vars={{ IRR_ESTIMATE }}>
  const range = document.getElementById('investment-range');
  const display = document.getElementById('investment-display');
  const divDisplay = document.getElementById('annual-dividends');
  const shareDisplay = document.getElementById('share-allocation');

  range.addEventListener('input', (e) => {
    const val = parseInt(e.target.value);
    
    // Update Display
    display.innerText = `฿ ${val.toLocaleString()}`;
    
    // Simple Yield Calculation
    const annualDiv = val * IRR_ESTIMATE;
    divDisplay.innerText = `฿ ${Math.round(annualDiv).toLocaleString()}`;
    
    // Mock Share Allocation (100 THB per share)
    const shares = val / 100;
    shareDisplay.innerText = `${Math.round(shares).toLocaleString()} Units`;
  });
</script>
<style>
  input[type='range']::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 24px;
    height: 24px;
    background: #D4AF37;
    cursor: pointer;
    border-radius: 50%;
    border: 4px solid white;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }
</style>

})();

</div>
<!-- STITCH_THREEJS_END:ANIMATION_14 -->
</body>
</html>
